name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.3"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - preview

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLo "${RUNNER_TEMP}/${archive}" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          printf '%s  %s\n' "${GITLEAKS_SHA256}" "${RUNNER_TEMP}/${archive}" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}" gitleaks
          sudo install -m 0755 "${RUNNER_TEMP}/gitleaks" /usr/local/bin/gitleaks
          rm -f "${RUNNER_TEMP}/${archive}" "${RUNNER_TEMP}/gitleaks"

      - name: Commit secret scan
        run: pnpm secrets:scan

      - name: Full dependency audit
        run: pnpm audit:all

      - name: Production dependency audit
        run: pnpm audit:prod

      - name: Release supply-chain generator smoke
        env:
          AREAFORGE_RELEASE_TAG: v0.0.0-smoke
          AREAFORGE_RELEASE_VERSION: 0.0.0
          AREAFORGE_RELEASE_CHANNEL: preview
          AREAFORGE_GIT_COMMIT: "0000000000000000000000000000000000000000"
          AREAFORGE_WEB_IMAGE: ghcr.io/areasong/areaforge-web:v0.0.0-smoke
          AREAFORGE_WEB_IMAGE_DIGEST: ghcr.io/areasong/areaforge-web:v0.0.0-smoke@sha256:1111111111111111111111111111111111111111111111111111111111111111
          AREAFORGE_MIGRATION_IMAGE: ghcr.io/areasong/areaforge-migration:v0.0.0-smoke
          AREAFORGE_MIGRATION_IMAGE_DIGEST: ghcr.io/areasong/areaforge-migration:v0.0.0-smoke@sha256:2222222222222222222222222222222222222222222222222222222222222222
          AREAFORGE_SBOM_PATH: ${{ runner.temp }}/areaforge-sbom.spdx.json
          AREAFORGE_PROVENANCE_PATH: ${{ runner.temp }}/areaforge-provenance.json
        run: pnpm release:supply-chain

      - name: Release supply-chain validator selftest
        run: pnpm release:supply-chain:selftest

      - name: Release supply-chain record selftest
        run: pnpm release:supply-chain:record:selftest

      - name: CI supply-chain record selftest
        run: pnpm ci:supply-chain:selftest

      - name: Release admission selftest
        run: pnpm release:admission:selftest

      - name: Release identity probe selftest
        run: pnpm release:identity:probe:selftest

      - name: Release workflow policy selftest
        run: pnpm release:workflow:policy:selftest

      - name: SC-004 main protection evidence selftests
        run: pnpm sc:sc-004:validate:selftest && pnpm sc:sc-004:preflight:selftest

      - name: Supply-chain preflight selftest
        run: pnpm sc:sc-002:preflight:selftest

      - name: Shellcheck updater
        run: pnpm shellcheck:updater

      - name: OPS-005 expected-before V2 selftest
        run: pnpm ops:ops-005:local:selftest && pnpm ops:ops-005:preflight:selftest && pnpm ops:ops-005:evidence:selftest

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: OPS-006/007/008 confirmation-before selftests
        run: pnpm ops:ops-006:preflight:selftest && pnpm ops:ops-007:preflight:selftest && pnpm ops:ops-008:preflight:selftest && pnpm ops:ops-006:preflight && pnpm ops:ops-007:preflight && pnpm ops:ops-008:preflight && pnpm attachment:crash-window:selftest && pnpm attachment:crash-window:validate scripts/quality/fixtures/attachment-crash-window/ops007-preconfirmation.json && pnpm updater:phase-journal:selftest && pnpm updater:phase-journal:validate scripts/quality/fixtures/update-agent/phase-journal/ops008-preconfirmation.json && pnpm updater:maintenance-control:selftest && pnpm updater:maintenance-control:validate scripts/quality/fixtures/update-agent/maintenance-control/ops008-hold-drain-preconfirmation.json && pnpm updater:maintenance-control:validate scripts/quality/fixtures/update-agent/maintenance-control/ops008-hold-waiting-preconfirmation.json && pnpm updater:maintenance-control:validate scripts/quality/fixtures/update-agent/maintenance-control/ops008-hold-lock-waiting-preconfirmation.json

      - name: Operability quality scripts typecheck
        run: pnpm quality:operability:typecheck

      - name: Operations lifecycle policy
        run: pnpm ops:lifecycle:selftest && pnpm ops:lifecycle:validate && pnpm ops:lifecycle:typecheck

      - name: OPS-001 fallback selftest
        run: pnpm ops:ops-001:fallback:selftest

      - name: Release evidence redacted export selftest
        run: pnpm release:evidence:redacted-export:selftest

      - name: Release evidence redacted export record selftest
        run: pnpm release:evidence:redacted-export:record:selftest

      - name: OPS-001 fallback finalizer selftest
        run: pnpm ops:ops-001:fallback:finalize:selftest

      - name: Updater preflight
        run: pnpm github-release-updater:preflight:selftest && pnpm github-release-updater:preflight

      - name: Governance preflight
        run: pnpm governance:preflight

      - name: Tasks workflow doctor
        run: pnpm tasks:doctor

      - name: Product experience binding selftest
        run: pnpm experience:runtime:selftest && pnpm release:runtime-identity:selftest && pnpm experience:review:selftest

      - name: Ops readiness preflight
        run: pnpm ops:readiness

      - name: Residual ledger validate
        run: pnpm residuals:validate

      - name: Package E preflight
        run: pnpm package-e:preflight

      - name: Risk preflight
        run: pnpm risk:preflight

      - name: Docs readiness
        run: pnpm docs:readiness

      - name: Docs completion
        run: pnpm docs:completion

      - name: Skills validate
        run: pnpm skills:validate

      - name: Error recovery matrix
        run: pnpm error-recovery:validate && pnpm error-recovery:selftest && pnpm api:error-redaction:selftest

      - name: Check
        run: pnpm check

  build-release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release tag
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
            channel="${INPUT_CHANNEL}"
          else
            tag="${REF_NAME}"
            channel="stable"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release tag must look like vX.Y.Z"
            exit 1
          fi
          if [[ "${channel}" != "stable" && "${channel}" != "preview" ]]; then
            echo "::error::release channel must be stable or preview"
            exit 1
          fi
          version="${tag#v}"
          image_repo="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          printf 'tag=%s\n' "${tag}" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${version}" >> "$GITHUB_OUTPUT"
          printf 'channel=%s\n' "${channel}" >> "$GITHUB_OUTPUT"
          printf 'web_image=%s\n' "${REGISTRY}/${image_repo}/areaforge-web:${tag}" >> "$GITHUB_OUTPUT"
          printf 'migration_image=%s\n' "${REGISTRY}/${image_repo}/areaforge-migration:${tag}" >> "$GITHUB_OUTPUT"

      - name: Fetch default branch for release admission
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --no-tags origin "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"

      - name: Validate release admission
        env:
          AREAFORGE_RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          AREAFORGE_WORKFLOW_SHA: ${{ github.sha }}
          AREAFORGE_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          AREAFORGE_EVENT_NAME: ${{ github.event_name }}
        run: pnpm release:admission

      - name: Compute immutable web runtime identity
        id: runtime_identity
        shell: bash
        run: |
          binding="$(pnpm experience:review:binding)"
          source_schema="$(printf '%s\n' "${binding}" | awk '/^sourceFingerprintSchema: / { print $2; exit }')"
          source_hash="$(printf '%s\n' "${binding}" | awk '/^productExperienceSourceHash: / { print $2; exit }')"
          build_id="sha256:$(printf '%s' "${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}:${GITHUB_SHA}" | sha256sum | awk '{print $1}')"
          [[ "${source_schema}" == "ux-source-v2" ]]
          [[ "${source_hash}" =~ ^sha256:[a-f0-9]{64}$ ]]
          [[ "${build_id}" =~ ^sha256:[a-f0-9]{64}$ ]]
          printf 'source_schema=%s\n' "${source_schema}" >> "${GITHUB_OUTPUT}"
          printf 'source_hash=%s\n' "${source_hash}" >> "${GITHUB_OUTPUT}"
          printf 'build_id=%s\n' "${build_id}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reject existing immutable release identity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AREAFORGE_RELEASE_REPOSITORY: ${{ github.repository }}
          AREAFORGE_RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          AREAFORGE_RELEASE_WEB_IMAGE: ${{ steps.vars.outputs.web_image }}
          AREAFORGE_RELEASE_MIGRATION_IMAGE: ${{ steps.vars.outputs.migration_image }}
        run: pnpm release:identity:probe

      - name: Build and push web image
        id: web
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.web_image }}
          build-args: |
            AREAFORGE_APP_VERSION=${{ steps.vars.outputs.version }}
            AREAFORGE_GIT_COMMIT=${{ github.sha }}
            AREAFORGE_UX_SOURCE_FINGERPRINT_SCHEMA=${{ steps.runtime_identity.outputs.source_schema }}
            AREAFORGE_UX_SOURCE_HASH=${{ steps.runtime_identity.outputs.source_hash }}
            AREAFORGE_BUILD_ID=${{ steps.runtime_identity.outputs.build_id }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            io.areaforge.ux-source-hash=${{ steps.runtime_identity.outputs.source_hash }}
            io.areaforge.runtime-build-id=${{ steps.runtime_identity.outputs.build_id }}
          cache-from: type=gha,scope=areaforge-docker
          cache-to: type=gha,mode=max,scope=areaforge-docker

      - name: Build and push migration image
        id: migration
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infra/docker/migration.Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.migration_image }}
          cache-from: type=gha,scope=areaforge-docker
          cache-to: type=gha,mode=max,scope=areaforge-docker

      - name: Generate release manifest
        shell: bash
        env:
          CHANNEL: ${{ steps.vars.outputs.channel }}
        run: |
          web_repo="${{ steps.vars.outputs.web_image }}"
          migration_repo="${{ steps.vars.outputs.migration_image }}"
          web_digest="${web_repo%@*}@${{ steps.web.outputs.digest }}"
          migration_digest="${migration_repo%@*}@${{ steps.migration.outputs.digest }}"
          cat > areaforge-release-manifest.json <<JSON
          {
            "schemaVersion": 1,
            "app": "AreaForge",
            "version": "${{ steps.vars.outputs.version }}",
            "channel": "${CHANNEL}",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "gitCommit": "${GITHUB_SHA}",
            "minimumAppVersion": "0.1.0",
            "webImage": "${{ steps.vars.outputs.web_image }}",
            "webImageDigest": "${web_digest}",
            "migrationImage": "${{ steps.vars.outputs.migration_image }}",
            "migrationImageDigest": "${migration_digest}",
            "requiresMigration": true,
            "composeAsset": "docker-compose.prod.yml",
            "sha256SumsAsset": "SHA256SUMS",
            "signatureAsset": "SHA256SUMS.sig",
            "sbomAsset": "areaforge-sbom.spdx.json",
            "provenanceAsset": "areaforge-provenance.json",
            "autoApply": {
              "patch": true,
              "minor": false,
              "major": false
            },
            "smoke": {
              "healthPath": "/api/health"
            },
            "releaseNotesUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ steps.vars.outputs.tag }}"
          }
          JSON

      - name: Generate release supply-chain metadata
        shell: bash
        env:
          AREAFORGE_RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          AREAFORGE_RELEASE_VERSION: ${{ steps.vars.outputs.version }}
          AREAFORGE_RELEASE_CHANNEL: ${{ steps.vars.outputs.channel }}
          AREAFORGE_GIT_COMMIT: ${{ github.sha }}
          AREAFORGE_WEB_IMAGE: ${{ steps.vars.outputs.web_image }}
          AREAFORGE_WEB_IMAGE_DIGEST: ${{ steps.vars.outputs.web_image }}@${{ steps.web.outputs.digest }}
          AREAFORGE_MIGRATION_IMAGE: ${{ steps.vars.outputs.migration_image }}
          AREAFORGE_MIGRATION_IMAGE_DIGEST: ${{ steps.vars.outputs.migration_image }}@${{ steps.migration.outputs.digest }}
        run: pnpm release:supply-chain

      - name: Generate release checksums
        shell: bash
        run: |
          sha256sum \
            areaforge-release-manifest.json \
            areaforge-sbom.spdx.json \
            areaforge-provenance.json \
            docker-compose.prod.yml > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign checksums
        shell: bash
        env:
          COSIGN_PRIVATE_KEY_B64: ${{ secrets.COSIGN_PRIVATE_KEY_B64 }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          CHANNEL: ${{ steps.vars.outputs.channel }}
        run: |
          signing_key="${RUNNER_TEMP}/areaforge-cosign.key"
          signing_error="${RUNNER_TEMP}/areaforge-cosign-sign.err"
          cleanup_signing() {
            rm -f "${signing_key}" "${signing_error}"
          }
          trap cleanup_signing EXIT
          has_signing_key=false
          if [ -n "${COSIGN_PRIVATE_KEY_B64:-}" ]; then
            printf '%s' "${COSIGN_PRIVATE_KEY_B64}" | base64 -d > "${signing_key}"
            has_signing_key=true
          elif [ -n "${COSIGN_PRIVATE_KEY:-}" ]; then
            printf '%s' "${COSIGN_PRIVATE_KEY}" > "${signing_key}"
            has_signing_key=true
          fi

          if [ "${has_signing_key}" != "true" ]; then
            if [ "${CHANNEL}" = "stable" ]; then
              echo "::error::stable releases require COSIGN_PRIVATE_KEY_B64 or COSIGN_PRIVATE_KEY"
              exit 1
            fi
            printf '%s\n' 'unsigned preview: configure COSIGN_PRIVATE_KEY_B64 and COSIGN_PASSWORD before publishing a stable release' > SHA256SUMS.sig
            exit 0
          fi

          chmod 600 "${signing_key}"
          if ! cosign sign-blob --yes --key "${signing_key}" --bundle SHA256SUMS.sig SHA256SUMS 2>"${signing_error}"; then
            while IFS= read -r line; do
              safe_line="$(printf '%s' "${line}" | sed -E 's/(COSIGN_PRIVATE_KEY|COSIGN_PRIVATE_KEY_B64|COSIGN_PASSWORD)=[^[:space:]]+/\1=<redacted>/g')"
              echo "::error::cosign signing failed: ${safe_line}"
            done < "${signing_error}"
            exit 1
          fi

      - name: Generate signed release supply-chain record
        shell: bash
        env:
          AREAFORGE_RELEASE_WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          AREAFORGE_RELEASE_WORKFLOW_RUN_CONCLUSION: success
          AREAFORGE_VALIDATE_JOB_STATUS: pass
          AREAFORGE_AUDIT_PROD_STATUS: pass
          AREAFORGE_GOVERNANCE_PREFLIGHT_STATUS: pass
          AREAFORGE_ACTIONS_PINNING_STATUS: pass
          AREAFORGE_RELEASE_WORKFLOW_STATUS: pass
          AREAFORGE_CHECKSUM_VERIFICATION: pass
          AREAFORGE_SIGNATURE_VERIFICATION: pass
          AREAFORGE_UNSIGNED_PLACEHOLDER_PRESENT: no
        run: pnpm release:supply-chain:record . > areaforge-release-supply-chain.md

      - name: Validate signed release supply chain
        shell: bash
        env:
          AREAFORGE_COSIGN_PUBLIC_KEY: docs/deployment/keys/areaforge-cosign.pub
        run: pnpm release:supply-chain:validate areaforge-release-supply-chain.md . --strict

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          prerelease: ${{ steps.vars.outputs.channel != 'stable' }}
          generate_release_notes: true
          files: |
            areaforge-release-manifest.json
            areaforge-sbom.spdx.json
            areaforge-provenance.json
            SHA256SUMS
            SHA256SUMS.sig
            docker-compose.prod.yml
            areaforge-release-supply-chain.md
