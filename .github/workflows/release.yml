name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.3"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        default: stable
        type: choice
        options:
          - stable
          - preview

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  CHANNEL: ${{ inputs.channel || 'stable' }}

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          version="${tag#v}"
          image_repo="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "web_image=${REGISTRY}/${image_repo}/areaforge-web:${tag}" >> "$GITHUB_OUTPUT"
          echo "migration_image=${REGISTRY}/${image_repo}/areaforge-migration:${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        id: web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.web_image }}
          cache-from: type=gha,scope=areaforge-docker
          cache-to: type=gha,mode=max,scope=areaforge-docker

      - name: Build and push migration image
        id: migration
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/migration.Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.migration_image }}
          cache-from: type=gha,scope=areaforge-docker
          cache-to: type=gha,mode=max,scope=areaforge-docker

      - name: Generate release manifest
        shell: bash
        run: |
          web_repo="${{ steps.vars.outputs.web_image }}"
          migration_repo="${{ steps.vars.outputs.migration_image }}"
          web_digest="${web_repo%@*}@${{ steps.web.outputs.digest }}"
          migration_digest="${migration_repo%@*}@${{ steps.migration.outputs.digest }}"
          cat > areaforge-release-manifest.json <<JSON
          {
            "schemaVersion": 1,
            "app": "AreaForge",
            "version": "${{ steps.vars.outputs.version }}",
            "channel": "${CHANNEL}",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "gitCommit": "${GITHUB_SHA}",
            "minimumAppVersion": "0.1.0",
            "webImage": "${{ steps.vars.outputs.web_image }}",
            "webImageDigest": "${web_digest}",
            "migrationImage": "${{ steps.vars.outputs.migration_image }}",
            "migrationImageDigest": "${migration_digest}",
            "requiresMigration": true,
            "composeAsset": "docker-compose.prod.yml",
            "sha256SumsAsset": "SHA256SUMS",
            "signatureAsset": "SHA256SUMS.sig",
            "autoApply": {
              "patch": true,
              "minor": false,
              "major": false
            },
            "smoke": {
              "healthPath": "/api/health"
            },
            "releaseNotesUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ steps.vars.outputs.tag }}"
          }
          JSON
          sha256sum areaforge-release-manifest.json docker-compose.prod.yml > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums or create placeholder
        shell: bash
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ -n "${COSIGN_PRIVATE_KEY:-}" ]; then
            cosign sign-blob --key env://COSIGN_PRIVATE_KEY --output-signature SHA256SUMS.sig SHA256SUMS
          else
            cat > SHA256SUMS.sig <<'EOF_SIG'
          unsigned: configure COSIGN_PRIVATE_KEY and COSIGN_PASSWORD repository secrets before enabling AREAFORGE_REQUIRE_SIGNATURE=true
          EOF_SIG
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          prerelease: ${{ env.CHANNEL != 'stable' }}
          generate_release_notes: true
          files: |
            areaforge-release-manifest.json
            SHA256SUMS
            SHA256SUMS.sig
            docker-compose.prod.yml
