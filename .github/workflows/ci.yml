name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Shellcheck updater
        run: pnpm shellcheck:updater

      - name: Updater preflight
        run: pnpm github-release-updater:preflight

      - name: Governance preflight
        run: pnpm governance:preflight

      - name: Ops readiness preflight
        run: pnpm ops:readiness

      - name: Residual ledger validate
        run: pnpm residuals:validate

      - name: Skills validate
        run: pnpm skills:validate

      - name: Package E preflight
        run: pnpm package-e:preflight

      - name: Risk preflight
        run: pnpm risk:preflight

      - name: Docs readiness
        run: pnpm docs:readiness

      - name: Docs completion
        run: pnpm docs:completion

      - name: Check
        run: pnpm check
